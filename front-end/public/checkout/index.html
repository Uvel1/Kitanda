<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ByClick</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <!-- CSS and Fonts -->
    <link rel="stylesheet" href="../css/checkout.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="toast-container"></div>

<header class="checkout-header">
    <div class="container">
        <a href="../explorar/index.html" class="logo">ByClick</a>
        <div class="secure-badge"><i class="fa-solid fa-lock"></i> Checkout Seguro</div>
    </div>
</header>

<main class="checkout-container">
    <div class="left-col">
        <div class="checkout-step">
            <div class="step-header">
                <span class="step-num">1</span>
                <h2>Detalhes de Faturação e Entrega</h2>
            </div>
            <div class="step-content">
                <form id="checkoutForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Província</label>
                            <select id="provincia" required>
                                <option value="">A carregar províncias...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Município</label>
                            <select id="municipio" required disabled>
                                <option value="">Selecione a província primeiro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Bairro / Rua</label>
                        <input type="text" id="bairro" required placeholder="Ex: Rua Direita, Bairro Talatona">
                    </div>
                    <div class="form-group">
                        <label>Notas para Entrega (opcional)</label>
                        <textarea id="notas" placeholder="Instruções especiais para a entrega..."></textarea>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="checkout-step">
            <div class="step-header">
                <span class="step-num">2</span>
                <h2>Método de Pagamento</h2>
            </div>
            <div class="step-content">
                <div class="payment-methods">
                    <label class="payment-option selected">
                        <input type="radio" name="payment" value="multicaixa" checked>
                        <div class="opt-content">
                            <i class="fa-solid fa-credit-card"></i>
                            <div>
                                <h4>Multicaixa / Transferência</h4>
                                <p>Pagamento direto por referência ou IBAN.</p>
                            </div>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="entrega">
                        <div class="opt-content">
                            <i class="fa-solid fa-hand-holding-dollar"></i>
                            <div>
                                <h4>Pagamento na Entrega</h4>
                                <p>Pague apenas quando receber o produto.</p>
                            </div>
                        </div>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="right-col">
        <div class="order-summary">
            <h3>Resumo do Pedido</h3>
            
            <div id="orderItems" class="order-items">
                <!-- Items injectados por JS -->
            </div>
            
            <div class="order-totals">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span id="subtotal">Carregando...</span>
                </div>
                <div class="total-row">
                    <span>Taxa de Entrega</span>
                    <span id="taxaEntrega">A calcular</span>
                </div>
                <div class="total-row grand-total">
                    <span>Total a Pagar</span>
                    <span id="grandTotal">---</span>
                </div>
            </div>
            
            <button id="btnFinalizar" class="btn-checkout">Finalizar Encomenda <i class="fa-solid fa-arrow-right"></i></button>
            <p class="secure-text"><i class="fa-solid fa-shield-halved"></i> Os seus dados pessoais estão protegidos.</p>
        </div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/checkout.js"></script>
</body>
</html>
