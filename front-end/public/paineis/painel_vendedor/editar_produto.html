<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto - Dashboard Vendedor</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/painel_vendedor.css">
</head>
<body>

<div class="sidebar-overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span>ByClick</span>
    </div>
    <div class="profile-section">
        <img src="https://via.placeholder.com/150" alt="Foto de perfil" class="profile-img" data-user-photo>
        <div class="profile-info">
            <h4 data-user-name>Carregando...</h4>
            <div class="profile-role"><i class="fa-solid fa-circle-check"></i> <span data-user-type>Vendedor</span></div>
        </div>
    </div>
    <nav>
        <div class="nav-label">Menu</div>
        <a href="painel_vendedor.html" class="nav-item"><i class="fa-solid fa-house"></i> Página Inicial</a>
        <a href="meus_produtos.html" class="nav-item active"><i class="fa-solid fa-box-open"></i> Meus Produtos</a>
        <a href="meus_servicos.html" class="nav-item"><i class="fa-solid fa-briefcase"></i> Meus Serviços</a>
        <a href="pedidos.html" class="nav-item"><i class="fa-solid fa-clipboard-list"></i> Pedidos</a>
        <a href="pagamentos.html" class="nav-item"><i class="fa-solid fa-wallet"></i> Pagamentos</a>
        <a href="avaliacoes.html" class="nav-item"><i class="fa-solid fa-star"></i> Avaliações</a>
        <a href="definicoes.html" class="nav-item"><i class="fa-solid fa-gear"></i> Definições</a>
        <a href="#" class="nav-item nav-logout" id="btnLogout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Terminar Sessão</a>
    </nav>
</aside>

<div class="main-content">
    <header class="topbar">
        <div class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></div>
        <div class="topbar-logo">ByClick</div>
        <div class="topbar-actions">
            <div class="icon-btn" onclick="window.location.href='notificacoes.html'"><i class="fa-solid fa-bell"></i></div>
            <div class="topbar-divider"></div>
            <div class="icon-btn"><i class="fa-regular fa-envelope"></i><span class="badge" data-msg-count>0</span></div>
        </div>
    </header>

    <main class="page">
        <div class="header-section" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="greeting">
                <h1>Editar Produto</h1>
                <p>Altere as informações e a imagem do seu produto.</p>
            </div>
            <button class="btn-secondary" onclick="window.location.href='meus_produtos.html'"><i class="fa-solid fa-arrow-left"></i> Voltar aos Produtos</button>
        </div>

        <div class="panel" style="max-width: 700px; margin: 0 auto; padding: 2rem;">
            <form id="formEditarProduto">
                <input type="hidden" id="produtoId">
                
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="width: 250px; height: 250px; margin: 0 auto; background: #eee; border-radius: 12px; overflow: hidden; position: relative; border: 2px dashed #ccc;">
                        <img id="imgPreview" src="https://via.placeholder.com/250?text=A+Carregar..." style="width: 100%; height: 100%; object-fit: cover;" alt="Preview">
                        <label for="imgUpload" style="position: absolute; bottom: 15px; right: 15px; background: var(--primary); color: white; padding: 12px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;">
                            <i class="fa-solid fa-camera"></i>
                        </label>
                        <input type="file" id="imgUpload" accept="image/*" style="display: none;" onchange="previewImagem(this)">
                    </div>
                    <p style="font-size: 0.85rem; color: #666; margin-top: 0.8rem;">Clique no ícone da câmara para alterar a imagem do produto</p>
                </div>

                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" class="form-control" id="nomeProduto" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea class="form-control" id="descricaoProduto" required rows="4"></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Preço (Kz)</label>
                        <input type="number" step="0.01" class="form-control" id="precoProduto" required>
                    </div>
                    <div class="form-group">
                        <label>Preço Promocional (Opcional, Kz)</label>
                        <input type="number" step="0.01" class="form-control" id="precoPromocionalProduto">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Stock Disponível</label>
                        <input type="number" class="form-control" id="estoqueProduto" required>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select class="form-control" id="categoriaProduto" required>
                            <option value="">A carregar categorias...</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem;" id="btnSalvar">
                    <i class="fa-solid fa-save"></i> Salvar Alterações
                </button>
            </form>
        </div>
    </main>
</div>

<script src="../../js/api.js"></script>
<script src="../../js/toast.js"></script>
<script src="../../js/editar_produto.js"></script>
</body>
</html>
